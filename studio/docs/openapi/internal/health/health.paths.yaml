openapi: 3.1.0

info:
  title: DIP Studio 健康检查接口
  version: 0.1.0

security: []

servers:
  - url: /api/dip-studio/internal/v1
  
paths:
  /healthz:
    get:
      operationId: healthCheck
      summary: 通用健康检查
      tags: [Health]
      responses:
        "200":
          description: 服务健康

  /readyz:
    get:
      operationId: readinessCheck
      summary: 就绪检查 (Readiness)
      tags: [Health]
      responses:
        "200":
          description: 就绪正常
